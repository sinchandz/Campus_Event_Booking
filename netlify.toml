[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy API requests to Render backend (avoids CORS issues)
[[redirects]]
  from = "/api/*"
  to = "https://campus-event-booking.onrender.com/api/:splat"
  status = 200
  force = true

# SPA catch-all: serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
