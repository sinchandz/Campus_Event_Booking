[build]
  command = "npm ci && cd backend && npm install && cd ../frontend && npm install && npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[functions]
  external_node_modules = ["serverless-http", "express", "cors", "dotenv", "mongoose", "bcryptjs", "jsonwebtoken"]
  included_files = ["backend/**"]
  node_bundler = "esbuild"

# Proxy API requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA catch-all: serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
